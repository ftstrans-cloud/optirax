<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTIRAX – Aktywacja konta</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0f1e;
  color:#e2e8f0;
  font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}
.card{
  background:#111827;
  border:1px solid #1e293b;
  border-radius:16px;
  padding:40px 36px;
  width:100%;
  max-width:460px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.logo{font-size:30px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:8px;}
.logo span{color:#6366f1;}
.spinner{
  width:48px;height:48px;
  border:3px solid #1e293b;
  border-top-color:#6366f1;
  border-radius:50%;
  margin:24px auto;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.msg{font-size:15px;color:#94a3b8;line-height:1.5;margin-top:8px;}
.msg.ok{color:#4ade80;}
.msg.err{color:#f87171;}
.btn{
  display:inline-block;margin-top:24px;padding:12px 28px;
  background:#6366f1;border:none;border-radius:10px;
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;
  text-decoration:none;
}
.btn:hover{background:#4f46e5;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">OPTI<span>RAX</span></div>
  <div id="content">
    <div class="spinner" id="spinner"></div>
    <div class="msg" id="status">Aktywujemy Twoje konto...</div>
    <div id="actions"></div>
  </div>

  <!-- Form do weryfikacji emaila (jeśli token to OTP) -->
  <div id="email-form" style="display:none;">
    <div class="msg" style="display:block;color:#94a3b8;background:transparent;border:none;padding:0;margin-bottom:16px;font-size:14px;">
      Potwierdź email z którym się rejestrowałeś, żebyśmy mogli zakończyć aktywację:
    </div>
    <input type="email" id="email" placeholder="twoj@email.com" style="width:100%;padding:14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:16px;min-height:48px;margin-bottom:16px;box-sizing:border-box;">
    <button class="btn" id="verifyBtn" style="width:100%;padding:15px;border:none;cursor:pointer;font-size:16px;font-weight:600;min-height:50px;">Aktywuj konto</button>
  </div>
</div>

<script>
(function(){
  const hash = window.location.hash.substring(1);
  if (!hash) {
    showError('Brak danych autoryzacji. Spróbuj ponownie z linkiem aktywacyjnym z maila.');
    return;
  }

  const params = new URLSearchParams(hash);

  // Sprawdź czy Supabase zwrócił błąd
  const error = params.get('error');
  if (error) {
    const description = params.get('error_description') || error;
    showError(decodeURIComponent(description).replace(/\+/g, ' '));
    return;
  }

  const token = params.get('access_token') || params.get('token');
  const type  = params.get('type'); // 'signup', 'recovery', 'magiclink'

  if (!token) {
    showError('Brak tokenu w linku. Sprawdź czy link nie jest stary lub uszkodzony.');
    return;
  }

  // Sprawdź czy to JWT (3 części rozdzielone kropkami) czy OTP (8 cyfr)
  const isJWT = token.split('.').length === 3;

  if (isJWT) {
    // Stary flow - od razu mamy JWT, wystarczy zapisać
    finishLogin(token, params.get('refresh_token'), type, null);
  } else {
    // Nowy flow - mamy OTP, trzeba zweryfikować email + token
    document.getElementById('content').style.display = 'none';
    document.getElementById('email-form').style.display = 'block';
    document.getElementById('verifyBtn').onclick = function(){
      const email = document.getElementById('email').value.trim();
      if (!email) { alert('Wpisz email'); return; }
      verifyOTP(token, email, type);
    };
    document.getElementById('email').focus();
  }

  function verifyOTP(otpToken, email, type){
    const btn = document.getElementById('verifyBtn');
    btn.disabled = true; btn.textContent = 'Aktywuję...';

    fetch('/api/auth/verify-signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: otpToken, email: email }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        document.getElementById('email-form').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        showError(data.error);
        return;
      }
      finishLogin(data.token, data.refresh_token, type, { user: data.user, profile: data.profile });
    })
    .catch(e => {
      document.getElementById('email-form').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      showError('Nie udało się aktywować konta. Spróbuj zalogować się ręcznie.');
    });
  }

  function finishLogin(accessToken, refreshToken, type, sessionData){
    localStorage.setItem('optirax_token', accessToken);
    if (refreshToken)              localStorage.setItem('optirax_refresh', refreshToken);
    if (sessionData?.user)         localStorage.setItem('optirax_user', JSON.stringify(sessionData.user));
    if (sessionData?.profile)      localStorage.setItem('optirax_profile', JSON.stringify(sessionData.profile));

    document.getElementById('email-form').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('spinner').style.display = 'none';
    const statusEl = document.getElementById('status');
    statusEl.className = 'msg ok';
    statusEl.textContent = type === 'signup'
      ? '✅ Konto aktywowane! Za chwilę przeniesiemy Cię do aplikacji.'
      : '✅ Zalogowano pomyślnie!';

    setTimeout(() => { window.location.href = '/'; }, 1500);
  }

  function showError(text){
    document.getElementById('spinner').style.display = 'none';
    const statusEl = document.getElementById('status');
    statusEl.className = 'msg err';
    statusEl.textContent = '❌ ' + text;
    document.getElementById('actions').innerHTML =
      '<a href="/login" class="btn">Idź do logowania</a>';
  }
})();
</script>
</body>
</html>
