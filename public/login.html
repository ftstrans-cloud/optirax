<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTIRAX – Logowanie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0f1e;
  color:#e2e8f0;
  font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}
.card{
  background:#111827;
  border:1px solid #1e293b;
  border-radius:16px;
  padding:40px 36px;
  width:100%;
  max-width:460px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.logo{font-size:30px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:4px;}
.logo span{color:#6366f1;}
.tagline{font-size:13px;color:#64748b;margin-bottom:28px;}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:#0f172a;border-radius:10px;padding:4px;}
.tab{flex:1;padding:12px 8px;border:none;border-radius:8px;background:transparent;
     color:#64748b;cursor:pointer;font-size:14px;font-weight:500;}
.tab.active{background:#1e293b;color:#e2e8f0;}
label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px;margin-top:18px;font-weight:500;}
input{width:100%;padding:14px 14px;background:#0f172a;border:1px solid #334155;
      border-radius:8px;color:#e2e8f0;font-size:16px;min-height:48px;}
input:focus{outline:none;border-color:#6366f1;}
input.err-border{border-color:#dc2626;}
.btn{width:100%;margin-top:24px;padding:15px;background:#6366f1;border:none;
     border-radius:10px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;min-height:50px;}
.btn:hover{background:#4f46e5;}
.btn:disabled{background:#374151;cursor:not-allowed;}
.msg{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:14px;display:none;line-height:1.4;}
.msg.ok{background:#052e16;color:#4ade80;border:1px solid #166534;}
.msg.err{background:#450a0a;color:#f87171;border:1px solid #991b1b;}
.msg.info{background:#172554;color:#93c5fd;border:1px solid #1e40af;}
.trial-info{margin-top:18px;text-align:center;font-size:13px;color:#475569;}
.trial-info b{color:#818cf8;}
.hint{font-size:12px;color:#64748b;margin-top:4px;line-height:1.3;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">OPTI<span>RAX</span></div>
  <div class="tagline">Smart Routes. Better Business.</div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Logowanie</button>
    <button class="tab" onclick="showTab('register')">Rejestracja</button>
  </div>

  <!-- LOGIN -->
  <div id="tab-login">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="twoj@email.com" autocomplete="email">
    <label>Hasło</label>
    <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">Zaloguj się</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- REGISTER -->
  <div id="tab-register" style="display:none;">
    <div id="planBadge" style="display:none;margin-bottom:16px;padding:10px 12px;background:#1e1b4b;border:1px solid #6366f1;border-radius:8px;font-size:13px;color:#c7d2fe;text-align:center;">
      📋 Wybrałeś: <b id="planLabel"></b>
    </div>
    <label>Imię i nazwisko</label>
    <input type="text" id="regName" placeholder="Jan Kowalski">
    <label>Firma (opcjonalnie)</label>
    <input type="text" id="regCompany" placeholder="Nazwa firmy transportowej">
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="twoj@email.com" autocomplete="email">
    <div class="hint">📩 Wyślemy tu link aktywacyjny — wpisz dokładnie.</div>
    <label>Powtórz email</label>
    <input type="email" id="regEmail2" placeholder="twoj@email.com" autocomplete="email" onpaste="return false;">
    <label>Hasło (min. 8 znaków)</label>
    <input type="password" id="regPass" placeholder="••••••••" autocomplete="new-password">
    <button class="btn" onclick="doRegister()">Zarejestruj się</button>
    <div class="msg" id="registerMsg"></div>
    <div class="trial-info">✅ <b>14 dni bezpłatnie</b> — bez karty kredytowej</div>
  </div>
</div>

<script>
function showTab(t){
  document.getElementById('tab-login').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = t==='register' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===(t==='login'?0:1)));
}

function showMsg(id, text, type){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if(!email||!pass){ showMsg('loginMsg','Uzupełnij email i hasło.','err'); return; }

  const btn = document.querySelector('#tab-login .btn');
  btn.disabled = true; btn.textContent = 'Logowanie...';

  try{
    const r = await fetch('/api/auth/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    const data = await r.json();
    if(!r.ok){ showMsg('loginMsg', data.error||'Błąd logowania','err'); return; }

    // Zapisz token
    localStorage.setItem('optirax_token', data.token);
    localStorage.setItem('optirax_refresh', data.refresh_token);
    localStorage.setItem('optirax_user', JSON.stringify(data.user));
    localStorage.setItem('optirax_profile', JSON.stringify(data.profile || {}));

    // Przekieruj
    window.location.href = '/';
  }catch(e){
    showMsg('loginMsg','Błąd połączenia z serwerem.','err');
  }finally{
    btn.disabled=false; btn.textContent='Zaloguj się';
  }
}

async function doRegister(){
  const name    = document.getElementById('regName').value.trim();
  const company = document.getElementById('regCompany').value.trim();
  const email   = document.getElementById('regEmail').value.trim();
  const email2  = document.getElementById('regEmail2').value.trim();
  const pass    = document.getElementById('regPass').value;

  // Wyczyść poprzednie błędy
  document.getElementById('regEmail').classList.remove('err-border');
  document.getElementById('regEmail2').classList.remove('err-border');

  if(!email||!pass){ showMsg('registerMsg','Uzupełnij email i hasło.','err'); return; }
  if(!email2){
    document.getElementById('regEmail2').classList.add('err-border');
    showMsg('registerMsg','Powtórz email — to zabezpieczenie przed literówką.','err');
    return;
  }
  if(email.toLowerCase() !== email2.toLowerCase()){
    document.getElementById('regEmail').classList.add('err-border');
    document.getElementById('regEmail2').classList.add('err-border');
    showMsg('registerMsg','Adresy email są różne — sprawdź czy nie ma literówki.','err');
    return;
  }
  if(pass.length<8){ showMsg('registerMsg','Hasło musi mieć co najmniej 8 znaków.','err'); return; }

  const btn = document.querySelector('#tab-register .btn');
  btn.disabled=true; btn.textContent='Rejestracja...';

  try{
    const r = await fetch('/api/auth/register',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass,full_name:name,company,plan:SELECTED_PLAN})
    });
    const data = await r.json();
    if(!r.ok){ showMsg('registerMsg',data.error||'Błąd rejestracji','err'); return; }
    showMsg('registerMsg','✅ Sprawdź skrzynkę email — wysłaliśmy link aktywacyjny na '+email+'. Po kliknięciu w link będziesz mógł się zalogować.','ok');
  }catch(e){
    showMsg('registerMsg','Błąd połączenia z serwerem.','err');
  }finally{
    btn.disabled=false; btn.textContent='Zarejestruj się';
  }
}

// Odczyt parametru ?plan= z URL i auto-przełączenie na rejestrację
const PLAN_LABELS = {
  solo: 'Plan Solo — 49 zł / mc',
  pro:  'Plan Pro — 149 zł / mc',
  team: 'Plan Team — 349 zł / mc',
};
const urlParams = new URLSearchParams(window.location.search);
const planParam = urlParams.get('plan');
const SELECTED_PLAN = ['solo','pro','team'].includes(planParam) ? planParam : null;

if(SELECTED_PLAN){
  // Przełącz na zakładkę rejestracji
  showTab('register');
  // Pokaż badge z wybranym planem
  document.getElementById('planBadge').style.display = 'block';
  document.getElementById('planLabel').textContent = PLAN_LABELS[SELECTED_PLAN];
}

// Jeśli już zalogowany — przekieruj
if(localStorage.getItem('optirax_token')){
  window.location.href='/';
}

// Enter key
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const loginVisible = document.getElementById('tab-login').style.display !== 'none';
    if(loginVisible) doLogin(); else doRegister();
  }
});
</script>
</body>
</html>
