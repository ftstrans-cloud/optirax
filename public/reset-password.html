<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTIRAX – Reset hasła</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0f1e;
  color:#e2e8f0;
  font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}
.card{
  background:#111827;
  border:1px solid #1e293b;
  border-radius:16px;
  padding:40px 36px;
  width:100%;
  max-width:460px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.logo{font-size:30px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:4px;text-align:center;}
.logo span{color:#6366f1;}
.tagline{font-size:13px;color:#64748b;margin-bottom:28px;text-align:center;}
h2{font-size:18px;color:#e2e8f0;margin-bottom:16px;text-align:center;font-weight:600;}
label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px;margin-top:18px;font-weight:500;}
input{
  width:100%;padding:14px 14px;background:#0f172a;border:1px solid #334155;
  border-radius:8px;color:#e2e8f0;font-size:16px;min-height:48px;
}
input:focus{outline:none;border-color:#6366f1;}
.btn{
  width:100%;margin-top:24px;padding:15px;background:#6366f1;border:none;
  border-radius:10px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;
  min-height:50px;
}
.btn:hover{background:#4f46e5;}
.btn:disabled{background:#374151;cursor:not-allowed;}
.btn.secondary{background:transparent;border:1px solid #334155;color:#94a3b8;}
.msg{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:14px;display:none;line-height:1.4;}
.msg.ok{background:#052e16;color:#4ade80;border:1px solid #166534;}
.msg.err{background:#450a0a;color:#f87171;border:1px solid #991b1b;}
.hint{font-size:12px;color:#64748b;margin-top:4px;line-height:1.3;}
.back{text-align:center;margin-top:20px;}
.back a{color:#818cf8;text-decoration:none;font-size:14px;}
.back a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">OPTI<span>RAX</span></div>
  <div class="tagline">Smart Routes. Better Business.</div>

  <h2 id="title">Ustaw nowe hasło</h2>

  <div id="form-area">
    <label>Nowe hasło (min. 8 znaków)</label>
    <input type="password" id="newPass" placeholder="••••••••" autocomplete="new-password">
    <label>Powtórz nowe hasło</label>
    <input type="password" id="newPass2" placeholder="••••••••" autocomplete="new-password">
    <button class="btn" onclick="doReset()">Zmień hasło</button>
    <div class="msg" id="resetMsg"></div>
  </div>

  <div class="back">
    <a href="/login">← Wróć do logowania</a>
  </div>
</div>

<script>
// Wyciągnij access_token z hash
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const TOKEN = params.get('access_token');
const ERROR = params.get('error_description');

if (ERROR) {
  document.getElementById('form-area').innerHTML =
    '<div class="msg err" style="display:block;">❌ ' +
    decodeURIComponent(ERROR).replace(/\+/g, ' ') +
    '<br><br>Poproś o nowy link.</div>';
}

if (!TOKEN && !ERROR) {
  document.getElementById('title').textContent = 'Nieprawidłowy link';
  document.getElementById('form-area').innerHTML =
    '<div class="msg err" style="display:block;">Ten link nie zawiera danych do resetu hasła. ' +
    'Upewnij się że klikasz najnowszy link z maila i nie był on już użyty.</div>';
}

function showMsg(text, type){
  const el = document.getElementById('resetMsg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

async function doReset(){
  const p1 = document.getElementById('newPass').value;
  const p2 = document.getElementById('newPass2').value;

  if (!p1 || !p2) { showMsg('Wpisz hasło w obu polach.', 'err'); return; }
  if (p1.length < 8) { showMsg('Hasło musi mieć co najmniej 8 znaków.', 'err'); return; }
  if (p1 !== p2)    { showMsg('Hasła są różne — sprawdź czy nie ma literówki.', 'err'); return; }

  const btn = document.querySelector('.btn');
  btn.disabled = true; btn.textContent = 'Zapisywanie...';

  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + TOKEN,
      },
      body: JSON.stringify({ password: p1 }),
    });
    const data = await r.json();
    if (!r.ok) { showMsg(data.error || 'Błąd resetu hasła', 'err'); return; }

    showMsg('✅ Hasło zmienione! Za chwilę przeniesiemy Cię do logowania.', 'ok');
    setTimeout(() => { window.location.href = '/login'; }, 2000);
  } catch(e) {
    showMsg('Błąd połączenia z serwerem.', 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Zmień hasło';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doReset();
});
</script>
</body>
</html>
